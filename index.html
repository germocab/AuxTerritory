<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territorios Dark</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-accent: #0a84ff;
            --apple-text: #ffffff;
            --apple-gray: #8e8e93;
            --apple-input: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 20px 0 30px 5px;
        }

        .card {
            background: var(--apple-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--apple-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--apple-input);
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--apple-accent);
            color: white;
            font-size: 17px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        .record-item {
            background: var(--apple-card);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info div:first-child {
            font-weight: 600;
            font-size: 17px;
        }

        .record-info div:last-child {
            color: var(--apple-gray);
            font-size: 14px;
            margin-top: 2px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .mañana { background: rgba(10, 132, 255, 0.15); color: #0a84ff; }
        .tarde { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }

        .delete-btn {
            background: none;
            color: #ff453a;
            font-size: 13px;
            margin-top: 5px;
            text-align: right;
            display: block;
            width: 100%;
        }

        h2 { font-size: 22px; margin: 10px 0 15px 5px; }
    </style>
</head>
<body>

    <div class="container">
        <header><h1>Territorios</h1></header>

        <div class="card">
            <div class="form-group">
                <label>Territorio</label>
                <select id="territorio"></select>
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Turno</label>
                <select id="turno">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                </select>
            </div>
            <button onclick="guardarRegistro()">Guardar Registro</button>
        </div>

        <h2>Historial</h2>
        <div id="listaRegistros"></div>
    </div>

    <script>
        const selectTerritorio = document.getElementById('territorio');
        for (let i = 1; i <= 36; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = `Territorio ${i}`;
            selectTerritorio.appendChild(opt);
        }

        document.getElementById('fecha').valueAsDate = new Date();
        let registros = JSON.parse(localStorage.getItem('territorios_db')) || [];

        function guardarRegistro() {
            const territorio = document.getElementById('territorio').value;
            const fecha = document.getElementById('fecha').value;
            const turno = document.getElementById('turno').value;
            if (!fecha) return;

            registros.unshift({ id: Date.now(), territorio, fecha, turno });
            actualizarUI();
            localStorage.setItem('territorios_db', JSON.stringify(registros));
        }

        function eliminar(id) {
            registros = registros.filter(r => r.id !== id);
            actualizarUI();
            localStorage.setItem('territorios_db', JSON.stringify(registros));
        }

        function actualizarUI() {
            const contenedor = document.getElementById('listaRegistros');
            contenedor.innerHTML = '';
            registros.forEach(r => {
                contenedor.innerHTML += `
                    <div class="record-item">
                        <div class="record-info">
                            <div>Territorio ${r.territorio}</div>
                            <div>${r.fecha}</div>
                            <span class="delete-btn" onclick="eliminar(${r.id})">Eliminar</span>
                        </div>
                        <span class="tag ${r.turno.toLowerCase()}">${r.turno}</span>
                    </div>`;
            });
        }
        actualizarUI();
    </script>
</body>
</html>
