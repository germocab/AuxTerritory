<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Territorios Pro</title>
    <meta name="theme-color" content="#f5f5f7" id="nav-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-accent: #0071e3;
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
            --apple-input: #f2f2f7;
        }

        [data-theme="dark"] {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-accent: #0a84ff;
            --apple-text: #ffffff;
            --apple-gray: #8e8e93;
            --apple-input: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }

        header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .theme-toggle {
            background: var(--apple-card);
            border: 1px solid var(--apple-gray);
            color: var(--apple-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Sección Recomendación */
        .rec-section {
            background: linear-gradient(135deg, #0071e3, #5856d6);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 25px;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 113, 227, 0.2);
        }

        .rec-section h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        .rec-content {
            font-size: 20px;
            font-weight: 700;
        }

        /* Card de Formulario */
        .card {
            background: var(--apple-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--apple-gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            padding-left: 4px;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--apple-input);
            color: var(--apple-text);
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--apple-accent);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* Lista Historial */
        h2 { font-size: 22px; margin-bottom: 15px; padding-left: 5px; }

        .record-item {
            background: var(--apple-card);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }

        .record-info div:first-child { font-weight: 600; font-size: 17px; margin-bottom: 2px; }
        .record-info div:nth-child(2) { color: var(--apple-gray); font-size: 14px; }

        .tag {
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .mañana { background: rgba(0, 113, 227, 0.12); color: var(--apple-accent); }
        .tarde { background: rgba(255, 159, 10, 0.12); color: #ff9f0a; }

        .delete-btn {
            color: #ff453a;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Territorios</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Oscuro</button>
        </header>

        <div class="rec-section">
            <h3>Recomendación</h3>
            <div id="recomendacion" class="rec-content">Analizando registros...</div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Seleccionar Territorio</label>
                <select id="territorio"></select>
            </div>
            <div class="form-group">
                <label>Fecha de Asignación</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Turno</label>
                <select id="turno">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                </select>
            </div>
            <button class="btn-main" onclick="guardarRegistro()">Registrar Actividad</button>
        </div>

        <h2>Historial Reciente</h2>
        <div id="listaRegistros"></div>
    </div>

    <script>
        // --- GESTIÓN DE TEMAS (Apple Style) ---
        function toggleTheme() {
            const body = document.body;
            const metaTheme = document.getElementById('nav-theme-color');
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            
            body.setAttribute('data-theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? 'Modo Claro' : 'Modo Oscuro';
            metaTheme.setAttribute('content', newTheme === 'dark' ? '#000000' : '#f5f5f7');
            localStorage.setItem('theme_pref', newTheme);
        }

        if (localStorage.getItem('theme_pref') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = 'Modo Claro';
            document.getElementById('nav-theme-color').setAttribute('content', '#000000');
        }

        // --- LÓGICA DE TERRITORIOS ---
        const selectTerritorio = document.getElementById('territorio');
        for (let i = 1; i <= 36; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = `Territorio ${i}`;
            selectTerritorio.appendChild(opt);
        }

        // Poner fecha de hoy sin desfase
        const hoy = new Date();
        const offset = hoy.getTimezoneOffset();
        const fechaLocal = new Date(hoy.getTime() - (offset*60*1000)).toISOString().split('T')[0];
        document.getElementById('fecha').value = fechaLocal;

        let registros = JSON.parse(localStorage.getItem('territorios_db')) || [];

        function guardarRegistro() {
            const n = document.getElementById('territorio').value;
            const f = document.getElementById('fecha').value; 
            const t = document.getElementById('turno').value;
            
            if (!f) return alert("Por favor selecciona una fecha");

            // ELIMINAR ASIGNACIÓN ANTERIOR (Solo queda la más reciente)
            registros = registros.filter(r => r.territorio !== n);

            // GUARDAR COMO STRING (Evita el error del día anterior)
            registros.unshift({ id: Date.now(), territorio: n, fecha: f, turno: t });
            
            // Ordenar: Más recientes arriba
            registros.sort((a, b) => b.fecha.localeCompare(a.fecha));

            actualizarUI();
            localStorage.setItem('territorios_db', JSON.stringify(registros));
        }

        function eliminar(id) {
            if(confirm("¿Eliminar este registro permanentemente?")) {
                registros = registros.filter(r => r.id !== id);
                actualizarUI();
                localStorage.setItem('territorios_db', JSON.stringify(registros));
            }
        }

        function actualizarUI() {
            const contenedor = document.getElementById('listaRegistros');
            contenedor.innerHTML = '';
            
            registros.forEach(r => {
                // CORRECCIÓN DE FECHA: Split para mostrar sin errores de zona horaria
                const [year, month, day] = r.fecha.split('-');
                const fechaLegible = `${day}/${month}/${year}`;

                contenedor.innerHTML += `
                    <div class="record-item">
                        <div class="record-info">
                            <div>Territorio ${r.territorio}</div>
                            <div>${fechaLegible}</div>
                            <span class="delete-btn" onclick="eliminar(${r.id})">Eliminar</span>
                        </div>
                        <span class="tag ${r.turno.toLowerCase()}">${r.turno}</span>
                    </div>`;
            });

            calcularRecomendacion();
        }

        function calcularRecomendacion() {
            const recEl = document.getElementById('recomendacion');
            
            // 1. Territorios nunca usados
            let nuncaAsignados = [];
            for(let i=1; i<=36; i++) {
                if(!registros.find(r => parseInt(r.territorio) === i)) {
                    nuncaAsignados.push(i);
                }
            }

            if(nuncaAsignados.length > 0) {
                recEl.innerText = `Territorio ${nuncaAsignados[0]} (Prioridad: Nuevo)`;
                return;
            }

            // 2. Territorio con la fecha más vieja
            let copia = [...registros].sort((a, b) => a.fecha.localeCompare(b.fecha));
            
            if(copia.length > 0) {
                const [y, m, d] = copia[0].fecha.split('-');
                recEl.innerText = `Territorio ${copia[0].territorio} (Desde ${d}/${m}/${y})`;
            } else {
                recEl.innerText = "No hay registros aún";
            }
        }

        // Carga inicial
        actualizarUI();
    </script>
</body>
</html>
