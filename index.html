<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Territorios Pro</title>
    <meta name="theme-color" content="#f5f5f7" id="nav-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-accent: #0071e3;
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
            --apple-input: #f2f2f7;
        }

        [data-theme="dark"] {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-accent: #0a84ff;
            --apple-text: #ffffff;
            --apple-gray: #8e8e93;
            --apple-input: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .theme-toggle {
            background: var(--apple-card);
            border: 1px solid var(--apple-gray);
            color: var(--apple-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Sección Recomendaciones Triple */
        .rec-container {
            margin-bottom: 25px;
        }

        .rec-container h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--apple-gray);
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .rec-card {
            background: linear-gradient(135deg, #0071e3, #5856d6);
            border-radius: 15px;
            padding: 15px 10px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.2);
        }

        .rec-card .num {
            font-size: 20px;
            font-weight: 800;
            display: block;
        }

        .rec-card .desc {
            font-size: 9px;
            opacity: 0.9;
            margin-top: 4px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Card de Formulario */
        .card {
            background: var(--apple-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--apple-gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            padding-left: 4px;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--apple-input);
            color: var(--apple-text);
            font-size: 16px;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--apple-accent);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Lista Historial */
        h2 { font-size: 22px; margin-bottom: 15px; padding-left: 5px; }

        .record-item {
            background: var(--apple-card);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info div:first-child { font-weight: 600; font-size: 17px; }
        .record-info div:nth-child(2) { color: var(--apple-gray); font-size: 14px; }

        .tag {
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .mañana { background: rgba(0, 113, 227, 0.12); color: var(--apple-accent); }
        .tarde { background: rgba(255, 159, 10, 0.12); color: #ff9f0a; }

        .delete-btn {
            color: #ff453a;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Territorios</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Oscuro</button>
        </header>

        <div class="rec-container">
            <h3>Sugerencias de Hoy</h3>
            <div class="rec-grid" id="recGrid">
                </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Seleccionar Territorio</label>
                <select id="territorio"></select>
            </div>
            <div class="form-group">
                <label>Fecha de Asignación</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Turno</label>
                <select id="turno">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                </select>
            </div>
            <button class="btn-main" onclick="guardarRegistro()">Registrar Actividad</button>
        </div>

        <h2>Historial Reciente</h2>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h2>Historial Reciente</h2>
    <button class="theme-toggle" onclick="exportarCSVSheets()" style="border-color: #34c759; color: #34c759;">Exportar Excel/Sheets</button>
</div>
        <div id="listaRegistros"></div>
    </div>

    <script>
        // --- TEMAS ---
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? 'Modo Claro' : 'Modo Oscuro';
            localStorage.setItem('theme_pref', newTheme);
        }

        if (localStorage.getItem('theme_pref') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = 'Modo Claro';
        }

        // --- LÓGICA ---
        const selectTerritorio = document.getElementById('territorio');
        for (let i = 1; i <= 36; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = `Territorio ${i}`;
            selectTerritorio.appendChild(opt);
        }

        // Fecha hoy local
        const hoy = new Date();
        const offset = hoy.getTimezoneOffset();
        const fechaLocal = new Date(hoy.getTime() - (offset*60*1000)).toISOString().split('T')[0];
        document.getElementById('fecha').value = fechaLocal;

        let registros = JSON.parse(localStorage.getItem('territorios_db')) || [];

        function guardarRegistro() {
            const n = document.getElementById('territorio').value;
            const f = document.getElementById('fecha').value; 
            const t = document.getElementById('turno').value;
            if (!f) return;

            registros = registros.filter(r => r.territorio !== n);
            registros.unshift({ id: Date.now(), territorio: n, fecha: f, turno: t });
            registros.sort((a, b) => b.fecha.localeCompare(a.fecha));

            actualizarUI();
            localStorage.setItem('territorios_db', JSON.stringify(registros));
        }

        function eliminar(id) {
            if(confirm("¿Eliminar registro?")) {
                registros = registros.filter(r => r.id !== id);
                actualizarUI();
                localStorage.setItem('territorios_db', JSON.stringify(registros));
            }
        }

        function actualizarUI() {
            const contenedor = document.getElementById('listaRegistros');
            contenedor.innerHTML = '';
            
            registros.forEach(r => {
                const [year, month, day] = r.fecha.split('-');
                contenedor.innerHTML += `
                    <div class="record-item">
                        <div class="record-info">
                            <div>Territorio ${r.territorio}</div>
                            <div>${day}/${month}/${year}</div>
                            <span class="delete-btn" onclick="eliminar(${r.id})">Eliminar</span>
                        </div>
                        <span class="tag ${r.turno.toLowerCase()}">${r.turno}</span>
                    </div>`;
            });

            calcularRecomendaciones();
        }

        function calcularRecomendaciones() {
            const grid = document.getElementById('recGrid');
            grid.innerHTML = '';
            
            // 1. Encontrar todos los territorios del 1-36
            let estados = [];
            for(let i=1; i<=36; i++) {
                const reg = registros.find(r => parseInt(r.territorio) === i);
                estados.push({
                    numero: i,
                    fecha: reg ? reg.fecha : '0000-00-00', // Nunca asignado = muy viejo
                    label: reg ? 'Antiguo' : 'Nuevo'
                });
            }

            // 2. Ordenar por fecha (el más viejo primero)
            estados.sort((a, b) => a.fecha.localeCompare(b.fecha));

            // 3. Tomar los 3 primeros
            const top3 = estados.slice(0, 3);

            top3.forEach(item => {
                let subtexto = item.label === 'Nuevo' ? 'Sin asignar' : formatearFechaSimple(item.fecha);
                grid.innerHTML += `
                    <div class="rec-card">
                        <span class="num">${item.numero}</span>
                        <span class="desc">${subtexto}</span>
                    </div>
                `;
            });
        }

        function formatearFechaSimple(f) {
            const [y, m, d] = f.split('-');
            return `${d}/${m}`;
        }

        actualizarUI();

function exportarCSVSheets() {
    if (registros.length === 0) {
        alert("No hay datos para exportar");
        return;
    }

    // 1. Crear encabezados
    let csvContent = "Territorio,Fecha,Turno\n";

    // 2. Agregar cada fila
    registros.forEach(r => {
        const [year, month, day] = r.fecha.split('-');
        const fechaFormateada = `${day}/${month}/${year}`;
        csvContent += `${r.territorio},${fechaFormateada},${r.turno}\n`;
    });

    // 3. Crear el archivo y descargarlo
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    
    link.setAttribute("href", url);
    link.setAttribute("download", `Territorios_Backup_${new Date().toISOString().split('T')[0]}.csv`);
    link.style.visibility = 'hidden';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
        
    </script>
</body>

</html>
