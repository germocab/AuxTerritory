<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territorios Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-accent: #0071e3;
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
            --apple-input: #f2f2f7;
            --apple-gold: #af9500;
        }

        [data-theme="dark"] {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-accent: #0a84ff;
            --apple-text: #ffffff;
            --apple-gray: #8e8e93;
            --apple-input: #2c2c2e;
            --apple-gold: #ffd60a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header h1 { font-size: 28px; font-weight: 700; }

        .theme-toggle {
            background: var(--apple-card);
            border: 1px solid var(--apple-gray);
            color: var(--apple-text);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        /* Sección Recomendación */
        .rec-section {
            background: linear-gradient(135deg, var(--apple-accent), #5856d6);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 25px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .rec-section h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .rec-content {
            font-size: 22px;
            font-weight: 700;
        }

        .card {
            background: var(--apple-card);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--apple-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--apple-input);
            color: var(--apple-text);
            font-size: 16px;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--apple-accent);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        .record-item {
            background: var(--apple-card);
            border-radius: 15px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info div:first-child { font-weight: 600; font-size: 17px; }
        .record-info div:last-child { color: var(--apple-gray); font-size: 14px; }

        .tag {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .mañana { background: rgba(0, 113, 227, 0.15); color: var(--apple-accent); }
        .tarde { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }

        .delete-btn {
            color: #ff453a;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
        }

        h2 { font-size: 22px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Territorios</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Oscuro</button>
        </header>

        <div class="rec-section">
            <h3>Recomendación</h3>
            <div id="recomendacion" class="rec-content">Cargando...</div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Número de Territorio</label>
                <select id="territorio"></select>
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Turno</label>
                <select id="turno">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                </select>
            </div>
            <button class="btn-main" onclick="guardarRegistro()">Registrar Actividad</button>
        </div>

        <h2>Historial</h2>
        <div id="listaRegistros"></div>
    </div>

    <script>
        // --- Temas ---
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? 'Modo Claro' : 'Modo Oscuro';
            localStorage.setItem('theme_pref', newTheme);
        }

        if (localStorage.getItem('theme_pref') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = 'Modo Claro';
        }

        // --- Lógica ---
        const selectTerritorio = document.getElementById('territorio');
        for (let i = 1; i <= 36; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = `Territorio ${i}`;
            selectTerritorio.appendChild(opt);
        }

        document.getElementById('fecha').valueAsDate = new Date();
        let registros = JSON.parse(localStorage.getItem('territorios_db')) || [];

        function guardarRegistro() {
            const n = document.getElementById('territorio').value;
            const f = document.getElementById('fecha').value;
            const t = document.getElementById('turno').value;
            if (!f) return;

            // ELIMINAR ASIGNACIÓN ANTERIOR DEL MISMO TERRITORIO
            registros = registros.filter(r => r.territorio !== n);

            // AGREGAR LA NUEVA
            registros.unshift({ id: Date.now(), territorio: n, fecha: f, turno: t });
            
            // Ordenar por fecha descendente para la lista visual
            registros.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

            actualizarUI();
            localStorage.setItem('territorios_db', JSON.stringify(registros));
        }

        function eliminar(id) {
            if(confirm("¿Borrar este registro?")) {
                registros = registros.filter(r => r.id !== id);
                actualizarUI();
                localStorage.setItem('territorios_db', JSON.stringify(registros));
            }
        }

        function actualizarUI() {
            const contenedor = document.getElementById('listaRegistros');
            contenedor.innerHTML = '';
            
            registros.forEach(r => {
                contenedor.innerHTML += `
                    <div class="record-item">
                        <div class="record-info">
                            <div>Territorio ${r.territorio}</div>
                            <div>${new Date(r.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' })}</div>
                            <span class="delete-btn" onclick="eliminar(${r.id})">Eliminar</span>
                        </div>
                        <span class="tag ${r.turno.toLowerCase()}">${r.turno}</span>
                    </div>`;
            });

            calcularRecomendacion();
        }

        function calcularRecomendacion() {
            const recEl = document.getElementById('recomendacion');
            
            // 1. Ver qué territorios no han sido asignados NUNCA
            let nuncaAsignados = [];
            for(let i=1; i<=36; i++) {
                if(!registros.find(r => parseInt(r.territorio) === i)) {
                    nuncaAsignados.push(i);
                }
            }

            if(nuncaAsignados.length > 0) {
                recEl.innerText = `Territorio ${nuncaAsignados[0]} (Sin asignar aún)`;
                return;
            }

            // 2. Si todos se asignaron al menos una vez, buscar el de fecha más antigua
            // Hacemos una copia y ordenamos por fecha ascendente (el más viejo primero)
            let copia = [...registros].sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            if(copia.length > 0) {
                recEl.innerText = `Territorio ${copia[0].territorio} (Desde ${copia[0].fecha})`;
            } else {
                recEl.innerText = "No hay datos suficientes";
            }
        }

        actualizarUI();
    </script>
</body>
</html>
